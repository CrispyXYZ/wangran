server:
  port: 80

spring:
  datasource:
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wangran_db
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  mvc:
    format:
      date: iso
      date-time: iso
      time: iso
  jackson:
    date-format: com.fasterxml.jackson.databind.util.ISO8601DateFormat

monitor:
  time:
    threshold: 50

logging:
  level:
    io.github.crispyxyz.wangran: DEBUG

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted